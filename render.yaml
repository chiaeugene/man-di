# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render dashboard > New > Blueprint > select this repo.
# After the first deploy, set the `sync: false` env vars in the Render
# dashboard (Environment tab) — they are secrets and are never stored here.

services:
  - type: web
    name: mandy
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: APP_PASSCODE
        sync: false
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MANDY_LLM_MODEL
        value: ""
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v21.0
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CRON_SECRET
        generateValue: true
      # Meta Embedded Signup ("Connect with Facebook" on /connect).
      # NEXT_PUBLIC_* values are baked in at build time — a change requires a
      # redeploy, not just a restart.
      - key: META_APP_SECRET
        sync: false
      - key: NEXT_PUBLIC_META_APP_ID
        sync: false
      - key: NEXT_PUBLIC_META_WA_CONFIG_ID
        sync: false

  # Fires the no-reply follow-up sweep (src/lib/followups.ts) on a schedule.
  # Requires a separate Render "Cron Job" service — an extra line item beyond
  # the web service above. CRON_SECRET must match the web service's value
  # (Render's `generateValue` mints it once for the first service that
  # declares the key; copy the same value onto this service in the dashboard,
  # or set both explicitly). Adjust the schedule to taste — hourly is a
  # reasonable default given followUpHours is capped at 20.
  - type: cron
    name: mandy-follow-ups
    runtime: node
    plan: starter
    region: singapore
    schedule: "0 * * * *"
    buildCommand: "true"
    startCommand: >-
      curl -sf -X POST -H "x-cron-secret: $CRON_SECRET"
      https://mandy-xezj.onrender.com/api/cron/follow-ups
    envVars:
      - key: CRON_SECRET
        sync: false
